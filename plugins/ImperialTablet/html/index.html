<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial CAD</title>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        .drag-bar {
            display: none;
            position: fixed;
            height: 30px;
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            border: 1px solid #3a3a5c;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            cursor: grab;
            z-index: 1000;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
        }

        .drag-bar:active {
            cursor: grabbing;
        }

        .drag-bar-title {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: rgba(120, 160, 255, 0.7);
            text-transform: uppercase;
            pointer-events: none;
        }

        .drag-bar-controls {
            display: flex;
            gap: 4px;
        }

        .size-btn {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: 700;
            color: rgba(180, 200, 255, 0.6);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            padding: 2px 7px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1.4;
        }

        .size-btn:hover {
            background: rgba(100, 140, 255, 0.18);
            color: rgba(200, 220, 255, 0.95);
            border-color: rgba(100, 140, 255, 0.4);
        }

        .monitor {
            display: none;
            position: fixed;
            background-color: #000;
            border: 15px solid #444;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .monitor.interacting iframe {
            pointer-events: none;
        }

        .background-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            font-size: 50px;
            font-family: 'Courier New', monospace;
            color: rgba(120, 160, 255, 0.7);
            pointer-events: none;
        }

        .screen {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            z-index: 2;
        }

        .resize-handle {
            position: fixed;
            z-index: 1001;
        }

        .resize-handle[data-dir="n"]  { cursor: n-resize;  height: 8px; }
        .resize-handle[data-dir="s"]  { cursor: s-resize;  height: 8px; }
        .resize-handle[data-dir="e"]  { cursor: e-resize;  width:  8px; }
        .resize-handle[data-dir="w"]  { cursor: w-resize;  width:  8px; }
        .resize-handle[data-dir="nw"] { cursor: nw-resize; width: 14px; height: 14px; }
        .resize-handle[data-dir="ne"] { cursor: ne-resize; width: 14px; height: 14px; }
        .resize-handle[data-dir="sw"] { cursor: sw-resize; width: 14px; height: 14px; }
        .resize-handle[data-dir="se"] { cursor: se-resize; width: 14px; height: 14px; }

        #license-container {
        display: none;
        position: fixed;
        bottom: 28px;
        right: 28px;
        width: 430px;
        height: 260px;
        z-index: 2000;
        font-family: Arial, Helvetica, sans-serif;
        filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.55));
        animation: dlSlideIn 0.18s ease-out;
    }

    @keyframes dlSlideIn {
        from {
            opacity: 0;
            transform: translateY(12px) scale(0.98);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .dl-card {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 14px;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.94), rgba(218,229,244,0.96)),
            radial-gradient(circle at 80% 15%, rgba(20, 91, 170, 0.18), transparent 36%),
            radial-gradient(circle at 20% 100%, rgba(190, 35, 45, 0.12), transparent 34%);
        border: 1px solid rgba(15, 35, 55, 0.28);
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,0.75),
            inset 0 -25px 50px rgba(0,0,0,0.04);
    }

    .dl-card::before {
        content: "IMPERIAL";
        position: absolute;
        left: 18px;
        top: 80px;
        font-size: 54px;
        font-weight: 900;
        letter-spacing: 8px;
        color: rgba(20, 60, 105, 0.055);
        transform: rotate(-8deg);
        pointer-events: none;
    }

    .dl-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
            repeating-linear-gradient(
                45deg,
                rgba(255,255,255,0.12) 0px,
                rgba(255,255,255,0.12) 2px,
                rgba(0,0,0,0.015) 3px,
                rgba(0,0,0,0.015) 5px
            );
        pointer-events: none;
        mix-blend-mode: multiply;
        opacity: 0.45;
    }

    .dl-topbar {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 45px;
        background: linear-gradient(90deg, #0f315c, #1d5a96);
        color: white;
        display: flex;
        align-items: center;
        padding: 0 16px;
        z-index: 2;
    }

    .dl-state {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 0.06em;
        line-height: 1;
    }

    .dl-title {
        margin-left: auto;
        text-align: right;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.16em;
        opacity: 0.9;
    }

    .dl-subtitle {
        position: absolute;
        top: 48px;
        left: 16px;
        right: 16px;
        color: #14385f;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        z-index: 2;
    }

    .dl-info {
        position: absolute;
        left: 30px;
        top: 53px;
        right: 16px;
        z-index: 2;
    }

    .dl-name {
        color: #111;
        font-size: 23px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .dl-row {
        display: grid;
        grid-template-columns: 74px 1fr;
        gap: 6px;
        margin-bottom: 5px;
        align-items: baseline;
    }

    .dl-label {
        color: #1f5f99;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.09em;
        text-transform: uppercase;
    }

    .dl-value {
        color: #111;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
    }

    .dl-small-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 7px;
        margin-top: 7px;
    }

    .dl-box {
        border-top: 1px solid rgba(20, 60, 100, 0.22);
        padding-top: 4px;
    }

    .dl-box .dl-label {
        display: block;
        font-size: 8px;
    }

    .dl-box .dl-value {
        display: block;
        font-size: 11px;
    }

    .dl-footer {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 13px;
        height: 33px;
        z-index: 2;
        display: flex;
        align-items: flex-end;
        gap: 12px;
    }

    .dl-barcode {
        flex: 1;
        height: 30px;
        border-radius: 3px;
        background:
            repeating-linear-gradient(
                90deg,
                #111 0px,
                #111 2px,
                transparent 2px,
                transparent 5px,
                #111 5px,
                #111 6px,
                transparent 6px,
                transparent 10px
            );
        opacity: 0.82;
    }

    .dl-rp-mark {
        width: 108px;
        color: rgba(120, 20, 25, 0.78);
        border: 1px solid rgba(120, 20, 25, 0.35);
        border-radius: 5px;
        padding: 4px;
        text-align: center;
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.1em;
        transform: rotate(-2deg);
    }
    </style>
</head>
<body>
    <div class="drag-bar" id="dragBar">
        <span class="drag-bar-title">ImperialCAD</span>
        <div class="drag-bar-controls">
            <button class="size-btn" data-preset="sm">SM</button>
            <button class="size-btn" data-preset="md">MD</button>
            <button class="size-btn" data-preset="lg">LG</button>
            <button class="size-btn" data-preset="xl">XL</button>
        </div>
    </div>

    <div class="monitor" id="monitor">
        <div class="background-text">ImperialCAD</div>
        <iframe
            class="screen"
            src="https://imperialcad.app/auth?type=tablet"
            sandbox="allow-popups allow-scripts allow-same-origin allow-forms allow-modals allow-presentation"
        ></iframe>
    </div>

    <div class="resize-handle" data-dir="n"></div>
    <div class="resize-handle" data-dir="s"></div>
    <div class="resize-handle" data-dir="e"></div>
    <div class="resize-handle" data-dir="w"></div>
    <div class="resize-handle" data-dir="nw"></div>
    <div class="resize-handle" data-dir="ne"></div>
    <div class="resize-handle" data-dir="sw"></div>
    <div class="resize-handle" data-dir="se"></div>

<div id="license-container">
    <div class="dl-card">
        <div class="dl-topbar">
            <div class="dl-state">San Andreas</div>
            <div class="dl-title">
                DRIVER LICENSE<br>
                IDENTIFICATION
            </div>
        </div>

        <div class="dl-info">
            <div class="dl-name" id="dl-fullname">NO CIVILIAN</div>

            <div class="dl-row">
                <span class="dl-label">License No</span>
                <span class="dl-value" id="license_number">N/A</span>
            </div>

            <div class="dl-row">
                <span class="dl-label">DOB</span>
                <span class="dl-value" id="dob">N/A</span>
            </div>

            <div class="dl-row">
                <span class="dl-label">EXP</span>
                <span class="dl-value" id="exp">N/A</span>
            </div>

            <div class="dl-row">
                <span class="dl-label">Address</span>
                <span class="dl-value" id="address">N/A</span>
            </div>

            <div class="dl-small-grid">
                <div class="dl-box">
                    <span class="dl-label">Class</span>
                    <span class="dl-value" id="dl-class">D</span>
                </div>

                <div class="dl-box">
                    <span class="dl-label">Sex</span>
                    <span class="dl-value" id="dl-sex">N/A</span>
                </div>

                <div class="dl-box">
                    <span class="dl-label">ID</span>
                    <span class="dl-value" id="id">N/A</span>
                </div>
            </div>
        </div>

        <div class="dl-footer">
            <div class="dl-barcode"></div>
            <div class="dl-rp-mark">IMPERIAL<br>IDENTIFICATION</div>
        </div>
    </div>
</div>

    <script src="script.js"></script>
    <script src="../../CivilianInt/html/script.js"></script>
</body>
</html>
